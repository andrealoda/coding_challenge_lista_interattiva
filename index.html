<!DOCTYPE html>
<html lang="en">

<head>

<body>

    <main class="main">
        <div class="container">
            <div class="card">
                <div class="card-title">
                    <h2>TASK MANAGER</h2>
                </div>
                <!-- /.card-title -->
                <div class="card-main">
                    <h3 class="label">
                        Inserisci la tua attività.
                    </h3>
                    <!-- /.label -->
                    <p class="input">
                        ➡️ <input type="text" name="task" id="task">
                    </p>
                    <!-- /.input -->
                    <button type="button" id="btn" onclick="taskAdder()">Aggiungi al task manager</button>
                    <!-- /#btn -->
                    <h4 class="error"></h4>
                    <!-- /.error -->
                    <div class="task-box">
                        <ul class="task-list" id="task-list">

                    </div>
                </div>
                <!-- /.card-main -->
            </div>
            <!-- /.card -->
        </div>
        <!-- /.container -->
    </main>
    <!-- /.main -->
